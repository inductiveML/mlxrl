name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff
        run: uv run --no-project --python 3.11 --with ruff ruff check .

      - name: Pytest CPU-safe subset
        run: >
          uv run --no-project --python 3.11 --with pytest
          pytest
          tests/test_benchmark_metrics.py
          tests/test_config.py
          tests/test_import_direction.py
          tests/test_rewards.py

      - name: Pyright CPU-safe subset
        run: >
          uv run --no-project --python 3.11 --with pyright --with pytest
          pyright
          mlxrl/config.py
          tests/test_config.py
          tests/test_import_direction.py
          tests/test_rewards.py

      - name: Build source and wheel distributions
        run: |
          rm -rf dist
          uv build

      - name: Check distribution metadata
        run: uv run --no-project --python 3.11 --with twine twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/inductive-mlxrl
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi
