model_id = "mlx-community/Qwen3-0.6B-4bit"
group_size = 4
max_prompt_len = 512
max_completion_len = 32
max_turns = 3
max_observation_len = 64
rollout_mode = "parallel_per_turn"
env_name = "recurring-text"
steps = 5
seed = 7
kl_beta = 0.0
rank = 8
scale = 20.0
dropout = 0.0
gradient_checkpointing = false
micro_batch_size = 0
output = "reference_outputs/gigpo_recurring_reference.npz"

[optimizer]
name = "adam"
learning_rate = 0.00001

[sampling]
temperature = 0.7
top_p = 0.95
min_p = 0.0
top_k = 0

[algorithm]
name = "gigpo"
gigpo_omega = 1.0
gigpo_gamma = 1.0
gigpo_normalization = "std"
